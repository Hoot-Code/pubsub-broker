apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: broker
  namespace: pubsub-system
  labels:
    app.kubernetes.io/name: pubsub
    app.kubernetes.io/component: broker
spec:
  serviceName: broker
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: pubsub
      app.kubernetes.io/component: broker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pubsub
        app.kubernetes.io/component: broker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: broker
          image: pubsub-broker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: client
              containerPort: 9000
              protocol: TCP
            - name: admin
              containerPort: 9001
              protocol: TCP
            - name: cluster
              containerPort: 9002
              protocol: TCP
          env:
            - name: BROKER_DATA_DIR
              value: /data
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/broker
              readOnly: true
          args:
            - -config
            - /etc/broker/broker.json
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 9001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 9001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /healthz/startup
              port: 9001
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: config
          configMap:
            name: broker-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
