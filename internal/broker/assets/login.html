<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pubsub-broker — Login</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#09090b;--bg2:#18181b;--bg3:#27272a;--border:#3f3f46;
    --text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
    --accent:#22c55e;--accent-dim:rgba(34,197,94,.12);
    --red:#ef4444;
    --mono:'SF Mono',SFMono-Regular,'Menlo','Consolas','Liberation Mono',monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  }
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:16px
  }
  .login-container{
    width:100%;max-width:380px;display:flex;flex-direction:column;gap:24px
  }
  .login-header{text-align:center}
  .login-header .icon{
    display:inline-flex;align-items:center;justify-content:center;
    width:40px;height:40px;margin:0 auto 12px;
    border-radius:8px;background:var(--accent-dim);color:var(--accent)
  }
  .login-header .icon svg{width:20px;height:20px}
  .login-header h1{font-size:16px;font-weight:600;letter-spacing:-.01em;margin-bottom:4px}
  .login-header .subtitle{font-size:12px;color:var(--text3);font-family:var(--mono)}
  .card{
    background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px
  }
  .form-group{margin-bottom:14px}
  .form-group label{
    display:block;font-size:12px;color:var(--text3);margin-bottom:6px;
    text-transform:uppercase;letter-spacing:.04em
  }
  .input-wrap{position:relative;display:flex;align-items:center}
  .input-wrap input{
    width:100%;padding:8px 12px;padding-right:36px;
    border:1px solid var(--border);border-radius:4px;
    background:var(--bg);color:var(--text);font-size:13px;
    font-family:var(--mono);outline:none;transition:border-color .15s
  }
  .input-wrap input:focus{border-color:var(--accent)}
  .input-wrap input.error{border-color:var(--red)}
  .toggle-visibility{
    position:absolute;right:8px;
    background:none;border:none;cursor:pointer;
    color:var(--text3);padding:4px;display:flex;align-items:center;
    transition:color .15s
  }
  .toggle-visibility:hover{color:var(--text2)}
  .toggle-visibility svg{width:16px;height:16px}
  .checkbox-row{
    display:flex;align-items:center;gap:8px;margin-bottom:16px
  }
  .checkbox-row input[type=checkbox]{
    width:14px;height:14px;accent-color:var(--accent);cursor:pointer
  }
  .checkbox-row label{
    font-size:12px;color:var(--text2);cursor:pointer;user-select:none
  }
  .btn-submit{
    width:100%;padding:8px 14px;border:1px solid var(--accent);border-radius:6px;
    background:var(--accent);color:#000;font-size:13px;font-weight:500;
    cursor:pointer;transition:all .15s;display:flex;align-items:center;
    justify-content:center;gap:6px;min-height:34px
  }
  .btn-submit:hover{background:#16a34a}
  .btn-submit:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
  .btn-submit .spinner{
    display:none;width:14px;height:14px;
    border:2px solid rgba(0,0,0,.2);border-top-color:#000;
    border-radius:50%;animation:spin .6s linear infinite
  }
  .btn-submit.loading .spinner{display:block}
  .btn-submit.loading .btn-text{display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-banner{
    background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
    border-radius:6px;padding:8px 12px;font-size:12px;color:#f87171;
    margin-top:12px;display:none
  }
  .error-banner.visible{display:block}
  .footer{text-align:center;font-size:11px;color:var(--text3)}
  @media(max-width:480px){
    .login-container{max-width:100%}
    .card{padding:16px}
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
    </div>
    <h1>Control Center</h1>
    <div class="subtitle">pubsub-broker</div>
  </div>

  <div class="card">
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <div class="input-wrap">
          <input
            type="password"
            id="apiKey"
            name="api_key"
            autocomplete="off"
            spellcheck="false"
            required
            aria-required="true"
            aria-describedby="apiKeyError"
          >
          <button
            type="button"
            class="toggle-visibility"
            id="toggleKey"
            aria-label="Show API key"
            tabindex="-1"
          >
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="rememberMe" name="remember">
        <label for="rememberMe">Remember me</label>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn" aria-label="Sign in">
        <span class="btn-text">Sign In</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>
    </form>

    <div class="error-banner" id="errorBanner" role="alert" aria-live="assertive"></div>
  </div>

  <div class="footer">Operational Control Center</div>
</div>

<script>
(function(){
  var form=document.getElementById('loginForm');
  var keyInput=document.getElementById('apiKey');
  var toggleBtn=document.getElementById('toggleKey');
  var submitBtn=document.getElementById('submitBtn');
  var errorBanner=document.getElementById('errorBanner');
  var rememberMe=document.getElementById('rememberMe');
  var eyeIcon=toggleBtn.querySelector('.icon-eye');
  var eyeOffIcon=toggleBtn.querySelector('.icon-eye-off');

  // Restore remembered state
  if(localStorage.getItem('pubsub_remember_key')==='1'){
    rememberMe.checked=true;
  }

  // Show session state messages
  var params=new URLSearchParams(window.location.search);
  if(params.get('expired')==='1'){
    showError('Your session has expired. Please sign in again.');
    if(window.history&&window.history.replaceState){
      window.history.replaceState(null,'',window.location.pathname);
    }
  }else if(params.get('logged_out')==='1'){
    showError('You have been signed out.');
    if(window.history&&window.history.replaceState){
      window.history.replaceState(null,'',window.location.pathname);
    }
  }

  // Password visibility toggle
  toggleBtn.addEventListener('click',function(){
    var isPassword=keyInput.type==='password';
    keyInput.type=isPassword?'text':'password';
    eyeIcon.style.display=isPassword?'none':'';
    eyeOffIcon.style.display=isPassword?'':'none';
    toggleBtn.setAttribute('aria-label',isPassword?'Hide API key':'Show API key');
    keyInput.focus();
  });

  // Show error
  function showError(msg){
    errorBanner.textContent=msg;
    errorBanner.classList.add('visible');
    keyInput.classList.add('error');
  }

  // Clear error
  function clearError(){
    errorBanner.textContent='';
    errorBanner.classList.remove('visible');
    keyInput.classList.remove('error');
  }

  // Set loading state
  function setLoading(loading){
    submitBtn.disabled=loading;
    if(loading){
      submitBtn.classList.add('loading');
      submitBtn.setAttribute('aria-busy','true');
    }else{
      submitBtn.classList.remove('loading');
      submitBtn.removeAttribute('aria-busy');
    }
  }

  // Form submission
  form.addEventListener('submit',function(e){
    e.preventDefault();
    clearError();

    var key=keyInput.value.trim();
    if(!key){
      showError('API key is required');
      keyInput.focus();
      return;
    }

    setLoading(true);

    // Remember me preference
    if(rememberMe.checked){
      localStorage.setItem('pubsub_remember_key','1');
    }else{
      localStorage.removeItem('pubsub_remember_key');
    }

    fetch('/dashboard/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({api_key:key})
    }).then(function(res){
      if(res.ok){
        window.location.href='/dashboard';
        return;
      }
      return res.json().then(function(data){
        setLoading(false);
        var msg='Invalid API key';
        if(data&&data.error){
          if(data.error==='rate limit exceeded')msg='Too many attempts. Please try again later.';
          else if(data.error==='api_key is required')msg='API key is required';
          else if(data.error==='invalid credentials')msg='Invalid API key';
          else msg=data.error;
        }
        showError(msg);
        keyInput.focus();
        keyInput.select();
      });
    }).catch(function(){
      setLoading(false);
      showError('Connection error. Please check your network.');
      keyInput.focus();
    });
  });

  // Clear error on input
  keyInput.addEventListener('input',clearError);

  // Auto-focus
  keyInput.focus();
})();
</script>
</body>
</html>
