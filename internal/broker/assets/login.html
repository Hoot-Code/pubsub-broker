<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pubsub-broker — Login</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a1a2e;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;
       display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#16213e;border:1px solid #0f3460;border-radius:8px;
        padding:2rem;width:100%;max-width:380px}
  h1{font-size:1.25rem;margin-bottom:1.5rem;text-align:center;color:#e94560}
  label{display:block;font-size:.85rem;margin-bottom:.35rem;color:#a0a0b0}
  input[type=password]{width:100%;padding:.6rem .75rem;border:1px solid #0f3460;
    border-radius:4px;background:#1a1a2e;color:#e0e0e0;font-size:.95rem;outline:none}
  input:focus{border-color:#e94560}
  button{width:100%;margin-top:1rem;padding:.65rem;border:none;border-radius:4px;
    background:#e94560;color:#fff;font-size:.95rem;cursor:pointer}
  button:hover{background:#c73650}
  .error{color:#e94560;font-size:.85rem;margin-top:.75rem;text-align:center;
    min-height:1.2em}
</style>
</head>
<body>
<div class="card">
  <h1>pubsub-broker</h1>
  <form id="loginForm">
    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" name="api_key" autocomplete="current-password" required>
    <button type="submit">Sign In</button>
  </form>
  <div class="error" id="error"></div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',async function(e){
  e.preventDefault();
  const key=document.getElementById('apiKey').value;
  const errEl=document.getElementById('error');
  errEl.textContent='';
  try{
    const res=await fetch('/dashboard/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({api_key:key})
    });
    if(res.ok){
      window.location.href='/dashboard';
    }else{
      errEl.textContent='Invalid API key';
    }
  }catch(err){
    errEl.textContent='Connection error';
  }
});
</script>
</body>
</html>
